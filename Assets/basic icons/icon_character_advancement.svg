<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Upward arrow shaft -->
  <rect x="45" y="40" width="10" height="40" 
        stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  
  <!-- Arrow head -->
  <path d="M30 45 L50 25 L70 45" 
        stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  
  <!-- Plus sign inside arrow shaft -->
  <line x1="50" y1="50" x2="50" y2="65" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42.5" y1="57.5" x2="57.5" y2="57.5" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Base/foundation line -->
  <line x1="35" y1="80" x2="65" y2="80" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Progress indicators (small ascending marks) -->
  <line x1="25" y1="70" x2="30" y2="65" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="75" x2="25" y2="70" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="75" y1="65" x2="80" y2="70" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="70" x2="85" y2="75" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
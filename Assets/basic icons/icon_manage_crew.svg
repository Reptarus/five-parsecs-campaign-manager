<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Three abstract humanoid figures (meeples/pawns) -->
  
  <!-- Left figure -->
  <circle cx="35" cy="35" r="6" 
          stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
  <path d="M35 41 L35 60 M30 50 L40 50 M30 60 L40 60" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Center figure (slightly taller/prominent) -->
  <circle cx="50" cy="32" r="7" 
          stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
  <path d="M50 39 L50 62 M44 52 L56 52 M44 62 L56 62" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Right figure -->
  <circle cx="65" cy="35" r="6" 
          stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
  <path d="M65 41 L65 60 M60 50 L70 50 M60 60 L70 60" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Base/platform -->
  <ellipse cx="50" cy="70" rx="25" ry="3" 
           stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Planet outline -->
  <circle cx="50" cy="50" r="30" 
          stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
  
  <!-- City buildings on planet surface -->
  <rect x="42" y="40" width="4" height="15" 
        stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <rect x="47" y="35" width="6" height="20" 
        stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <rect x="54" y="38" width="4" height="17" 
        stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  
  <!-- Building details (windows/lights) -->
  <rect x="48.5" y="42" width="1" height="1" fill="#FFFFFF"/>
  <rect x="51.5" y="42" width="1" height="1" fill="#FFFFFF"/>
  <rect x="48.5" y="47" width="1" height="1" fill="#FFFFFF"/>
  <rect x="51.5" y="47" width="1" height="1" fill="#FFFFFF"/>
  
  <!-- Planet surface curve -->
  <path d="M25 45 Q35 42 45 45 Q55 48 65 45 Q75 42 80 45" 
        stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  
  <!-- Atmospheric rings/orbit lines -->
  <ellipse cx="50" cy="50" rx="38" ry="15" 
           stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <ellipse cx="50" cy="50" rx="42" ry="8" 
           stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.4"/>
</svg>
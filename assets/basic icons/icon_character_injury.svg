<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Crutch main shaft -->
  <line x1="45" y1="25" x2="45" y2="75" 
        stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Top horizontal support (armpit rest) -->
  <rect x="35" y="22" width="20" height="6" 
        stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  
  <!-- Hand grip -->
  <rect x="38" y="45" width="14" height="4" 
        stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  
  <!-- Hand grip padding indicators -->
  <line x1="40" y1="47" x2="50" y2="47" 
        stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Bottom foot/tip -->
  <ellipse cx="45" cy="78" rx="4" ry="3" 
           stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
  
  <!-- Crutch adjustment holes -->
  <circle cx="45" cy="35" r="1" 
          stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <circle cx="45" cy="40" r="1" 
          stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <circle cx="45" cy="55" r="1" 
          stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <circle cx="45" cy="60" r="1" 
          stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  
  <!-- Support brace -->
  <path d="M40 30 L50 35" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
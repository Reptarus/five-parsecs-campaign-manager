<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Futuristic data chip base -->
  <rect x="30" y="25" width="40" height="45" 
        stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  
  <!-- Corner cutout for chip aesthetic -->
  <path d="M65 25 L65 30 L70 30" 
        stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  
  <!-- Circuit lines on chip -->
  <line x1="35" y1="35" x2="45" y2="35" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="40" x2="50" y2="40" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="35" x2="65" y2="35" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="40" x2="60" y2="40" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Central processing area -->
  <rect x="42" y="45" width="16" height="10" 
        stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  
  <!-- Connection ports -->
  <rect x="28" y="50" width="4" height="3" 
        stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <rect x="68" y="50" width="4" height="3" 
        stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  
  <!-- Download arrow -->
  <path d="M50 55 L50 65 M45 60 L50 65 L55 60" 
        stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Base platform indicator -->
  <line x1="40" y1="72" x2="60" y2="72" 
        stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Footprint outline -->
  <ellipse cx="45" cy="55" rx="8" ry="12" 
           stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
  
  <!-- Toe marks on footprint -->
  <circle cx="42" cy="45" r="2" 
          stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <circle cx="45" cy="43" r="2" 
          stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <circle cx="48" cy="44" r="2" 
          stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <circle cx="50" cy="46" r="1.5" 
          stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  
  <!-- Heel mark -->
  <ellipse cx="45" cy="62" rx="4" ry="6" 
           stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  
  <!-- Target crosshair overlay -->
  <circle cx="50" cy="50" r="20" 
          stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
  
  <!-- Crosshair lines -->
  <line x1="30" y1="50" x2="40" y2="50" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="50" x2="70" y2="50" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="30" x2="50" y2="40" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="60" x2="50" y2="70" 
        stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Inner targeting circle -->
  <circle cx="50" cy="50" r="10" 
          stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="2" 
          stroke="#FFFFFF" stroke-width="1.5" fill="#FFFFFF"/>
</svg>
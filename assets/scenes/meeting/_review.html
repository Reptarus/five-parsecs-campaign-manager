<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PSD Review: meeting</title>
<style>
  :root {
    --bg: #1A1A2E;
    --elevated: #252542;
    --input: #1E1E36;
    --border: #3A3A5C;
    --accent: #2D5A7B;
    --accent-hover: #3A7199;
    --focus: #4FC3F7;
    --text: #E0E0E0;
    --text-secondary: #808080;
    --success: #10B981;
    --warning: #D97706;
    --danger: #DC2626;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.4 system-ui, sans-serif;
    margin: 0;
    padding: 0 0 80px 0;
  }
  header {
    padding: 16px 24px;
    background: var(--elevated);
    border-bottom: 1px solid var(--border);
  }
  h1 { margin: 0 0 4px 0; font-size: 22px; }
  header .meta { color: var(--text-secondary); font-size: 13px; font-family: ui-monospace, monospace; }
  nav.filter-bar {
    padding: 12px 24px;
    background: var(--elevated);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 10;
  }
  nav button {
    background: var(--input); color: var(--text); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font: inherit;
    min-height: 32px;
  }
  nav button:hover { background: var(--accent); border-color: var(--accent-hover); }
  nav button.active { background: var(--accent); border-color: var(--focus); color: white; }
  main.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    padding: 24px;
  }
  .card {
    background: var(--elevated); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card.dirty { border-color: var(--warning); }
  .card .thumb-wrap {
    background: #000; height: 200px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card .thumb-wrap img { max-width: 100%; max-height: 100%; display: block; }
  .card .thumb-wrap.empty { color: var(--danger); font-size: 12px; }
  .card .info {
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .card .row-name {
    font-weight: 600; font-size: 13px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card .row-meta { color: var(--text-secondary); font-size: 11px; font-family: ui-monospace, monospace; }
  .card .row-cat { display: flex; align-items: center; gap: 6px; }
  .card .row-cat select {
    flex: 1; background: var(--input); color: var(--text);
    border: 1px solid var(--border); border-radius: 3px; padding: 4px 6px;
    min-height: 28px;
  }
  .card .auto-badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; background: var(--input); color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .card .auto-badge.manual { background: var(--success); color: var(--bg); border-color: var(--success); }
  footer.actions {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 24px;
    background: var(--elevated); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    z-index: 20;
  }
  footer #dirty-count { color: var(--text-secondary); }
  footer #dirty-count.has { color: var(--warning); font-weight: 600; }
  footer button#download {
    background: var(--accent); color: white; border: none;
    padding: 8px 20px; border-radius: 4px; cursor: pointer;
    font: inherit; min-height: 36px;
  }
  footer button#download:hover { background: var(--accent-hover); }
  footer button#download:disabled { background: var(--border); color: var(--text-secondary); cursor: not-allowed; }
</style>
</head>

const CATS = ["bg", "actor", "fx", "prop", "skip"];
let activeFilter = "all";
const originalCategory = {};
CATALOG.layers.forEach(l => { originalCategory[l.index] = l.category; });

function counts() {
  const c = { all: CATALOG.layers.length, bg:0, actor:0, fx:0, prop:0, skip:0 };
  CATALOG.layers.forEach(l => { c[l.category] = (c[l.category] || 0) + 1; });
  return c;
}

function dirtyCount() {
  let n = 0;
  CATALOG.layers.forEach(l => { if (l.category !== originalCategory[l.index]) n++; });
  return n;
}

function renderFilterBar() {
  const c = counts();
  const bar = document.getElementById("filter-bar");
  bar.innerHTML = "";
  ["all", ...CATS].forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat.toUpperCase() + " (" + (c[cat] || 0) + ")";
    btn.dataset.cat = cat;
    if (cat === activeFilter) btn.classList.add("active");
    btn.onclick = () => { activeFilter = cat; renderAll(); };
    bar.appendChild(btn);
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  CATALOG.layers.forEach(l => {
    if (activeFilter !== "all" && l.category !== activeFilter) return;
    const card = document.createElement("div");
    card.className = "card";
    if (l.category !== originalCategory[l.index]) card.classList.add("dirty");

    const thumbWrap = document.createElement("div");
    thumbWrap.className = "thumb-wrap";
    if (THUMBS[l.index]) {
      const img = document.createElement("img");
      img.src = THUMBS[l.index];
      img.loading = "lazy";
      thumbWrap.appendChild(img);
    } else {
      thumbWrap.classList.add("empty");
      thumbWrap.textContent = "(no thumbnail)";
    }
    card.appendChild(thumbWrap);

    const info = document.createElement("div");
    info.className = "info";
    info.innerHTML = `
      <div class="row-name">[${l.index}] ${escapeHtml(l.name)}</div>
      <div class="row-meta">${l.width}x${l.height} &middot; op ${l.opacity} &middot; ${escapeHtml(l.blend_mode)}</div>
    `;
    const rowCat = document.createElement("div");
    rowCat.className = "row-cat";
    const sel = document.createElement("select");
    CATS.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c; opt.textContent = c.toUpperCase();
      if (c === l.category) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = () => {
      l.category = sel.value;
      l.auto_category = false;
      renderAll();
    };
    rowCat.appendChild(sel);
    const badge = document.createElement("span");
    badge.className = "auto-badge" + (l.auto_category ? "" : " manual");
    badge.textContent = l.auto_category ? "auto" : "manual";
    rowCat.appendChild(badge);
    info.appendChild(rowCat);

    card.appendChild(info);
    grid.appendChild(card);
  });
}

function renderFooter() {
  const n = dirtyCount();
  const lbl = document.getElementById("dirty-count");
  const btn = document.getElementById("download");
  lbl.textContent = n + (n === 1 ? " change" : " changes");
  lbl.classList.toggle("has", n > 0);
  btn.disabled = n === 0;
}

function renderAll() {
  renderFilterBar();
  renderGrid();
  renderFooter();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

document.getElementById("download").onclick = () => {
  const blob = new Blob([JSON.stringify(CATALOG, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "_layer_catalog.json";
  a.click();
  URL.revokeObjectURL(url);
};

renderAll();
</script>
